<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<title>បញ្ជីឈ្មោះភ្ញៀវ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Barcode -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="css/barcode.css">
</head>
<body>
<div class="topbar">
  <div class="menu-btn" onclick="openMenu()">☰</div>
  <div>គ្រប់គ្រង់ភ្ញៀវ</div>
</div>
<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sidebar" id="sidebar">
  <a onclick="goIndex('index')">
    📊 មើលទិន្នន័យ
  </a>
  <a style="background-color: #1aa4bd;color: rgb(234, 234, 209);"onclick="goBarcode('barcode')">
    📋 ចុះឈ្មោះភ្ញៀវ
  </a>
  <a onclick="goScan()">
    📷 ស្គែនភ្ញៀវ
  </a>
  <!-- NEW -->
  <a onclick="goUnpaid()" 
   style="
     display:flex;
     justify-content:space-between;
     align-items:center;
   ">
  <span style="color: red;">
    🔔 មិនទាន់ចងដៃ
  </span>
  <span id="pendingBadge"
    style="
      background:#ff3b30;
      color:white;
      min-width:12px;
      height:22px;
      padding:0 6px;
      border-radius:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:bold;
      box-shadow:0 2px 8px rgba(0,0,0,.2);
    ">
    0
  </span>

</a>
</div>
<!-- ===== TOPBAR ===== -->
<div class="container">
<!-- SEARCH -->
<div class="card search-card">
  <div class="search-wrapper">
    <!-- SEARCH BOX -->
    <div class="search-box-custom">
      <span class="search-icon"></span>
      <input
        type="text"
        id="searchInput"
        placeholder="ស្វែងរក ID / ឈ្មោះ / ចំណាំ..."
        onkeyup="render()"
      >
    </div>
    <!-- PRINT BUTTON -->
    <button
      class="print-btn"
      onclick="openPrintPage()"
    >
      🖨️ Print
    </button>
  </div>
</div>
  <!-- TABLE -->
  <div class="table-scroll">
  <div class="filter-bar">
  <button
    class="filter-btn active"
    id="sortAscBtn"
    onclick="setSort('asc')"
  >
    🔼 ID → តូច
  </button>
  <button
    class="filter-btn"
    id="sortDescBtn"
    onclick="setSort('desc')"
  >
    🔽 ID → ធំ
  </button>
</div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>ឈ្មោះ</th>
          <th>Barcode</th>
          <th>ចំណាំ</th>
          <th>សកម្មភាព</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>
<!-- ===== FLOAT BUTTON ===== -->
<button class="fab" onclick="openAddModal()">
  +
</button>
<!-- ===== ADD MODAL ===== -->
<div class="modal" id="addModal">
  <div class="modal-box">
    <h3 style="margin-top:0;color:#1aa4bd;">
      ➕ បន្ថែមឈ្មោះភ្ញៀវ
    </h3>
       <label>ឈ្មោះភ្ញៀវ</label>
   <div class="input-group">
    <input type="text"
    id="nameInput"
    placeholder="បញ្ចូលឈ្មោះ">
   </div>
     <div class="input-group">
        <label>📝 ចំណាំ</label>
        <textarea id="noteInput" rows="3"
        placeholder="បញ្ចូលចំណាំ..."></textarea>
      </div>
<div class="btn-group">
  <button class="cancel-btn"
    onclick="closeAddModal()">
      ❌ បោះបង់
    </button>
 <button class="save-btn"
    onclick="addData()">
      💾 រក្សាទុក
    </button> 
</div>
</div>

</div>
<!-- ===== BARCODE MODAL ===== -->
<div class="modal" id="barcodeModal">

<div class="modal-box"
style="
max-width:450px;
text-align:center;
">

<h2 style="
margin-top:0;
color:#1aa4bd;
">
ទាញយក Barcode
</h2>

<div style="
padding:20px;
background:#fff;
border-radius:14px;
overflow:auto;
">

<svg id="previewBarcode"></svg>

</div>

<div id="previewText"
style="
margin-top:15px;
font-size:22px;
font-weight:bold;
">
</div>

<div id="previewName"
style="
margin-top:10px;
font-size:20px;
color:#1aa4bd;
font-weight:bold;
">
</div>
<div class="btn-group">
<button
class="save-btn"
onclick="downloadBarcode()">
⬇️ រក្សាទុក
</button>

<button
class="save-btn"
style="background:#1877f2;"
onclick="shareBarcode()">
📤 ចែករំលែក
</button>

<button
class="cancel-btn"
onclick="closeBarcodeModal()">
❌ បិទ
</button>

</div>

</div>

</div>
</div>
<!-- ===== EDIT MODAL ===== -->
<div class="modal" id="editModal">
  <div class="modal-box"
  style="font-family:'Khmer OS Battambang';">
    <h3 style="margin-top:0;color:#1aa4bd;">
      កែប្រែទិន្នន័យ
    </h3>
    <input type="text" id="editName"
    style="font-family:'Khmer OS Battambang';">

     <div class="input-group">
        <label>📝 ចំណាំ</label>
        <textarea id="editNote" rows="3"
        placeholder="បញ្ចូលចំណាំ..."></textarea>
      </div>

    <div class="btn-group">

      <button class="cancel-btn"
      onclick="closeEditModal()"
      style="font-family:'Khmer OS Battambang';">
        ❌ បោះបង់
      </button>

      <button class="save-btn"
      onclick="updateData()"
      style="font-family:'Khmer OS Battambang';">
        ✅ កែប្រែ
      </button>

    </div>

  </div>

</div>
 <div class="modal" id="confirmModal">
  <div class="modal-box" style="text-align:center;">

    <h3 style="color: red;">⚠️ លុបទិន្ន័យ</h3>

<p id="confirmText">
  តើអ្នកពិតជាចង់លុបទិន្នន័យនេះមែនទេ?
</p>

    <div  style="
  display:flex;
  gap:10px;
  margin-top:15px;
">    <button style="flex:1;
      padding:12px;
      border-radius:10px;
      border:none;
      background:#b4b6b858;
      color:rgb(255, 0, 0);
      font-weight:bold;
      cursor:pointer;
       font-family:'Khmer OS Battambang';
    " onclick="closeConfirm()">❌ អត់ទេ</button>
      <button style="
      flex:1;
      padding:12px;
      border-radius:10px;
      border:none;
      background:#1aa4bd;
      color:white;
      font-weight:bold;
      cursor:pointer;
      font-family:'Khmer OS Battambang';
    " id="confirmYes">✔ បាទ/ចាស់</button>
      
    </div>

  </div>
</div>
<div id="toast"></div>

<div id="loadingOverlay">
  ⏳ កំពុងដំណើរការ...
</div>
<script src="firebase.js"></script>
<script src="js/barcode.js"></script>
</body>
</html>
